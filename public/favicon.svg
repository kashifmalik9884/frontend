<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Premium Neon Green Theme Gradients -->
    <linearGradient id="neonGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>   <!-- Emerald Node -->
      <stop offset="50%" stop-color="#22c55e"/>  <!-- Core Brand Green -->
      <stop offset="100%" stop-color="#4ade80"/> <!-- Neon Highlight -->
    </linearGradient>

    <linearGradient id="cyberSteel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <!-- Drop shadow and blur mapping for the bright green laser glow effect -->
    <filter id="neonFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#22c55e" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Deep Titanium App Canvas base structure -->
  <rect width="100" height="100" rx="24" fill="#0b0f17"/>

  <!-- ACCESSORY 1: Outer Crosshair Radar Rings (SaaS Analytics Tracking Layout) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#1e293b" stroke-width="1"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="2 3"/>
  
  <!-- Radar Axis Marks -->
  <line x1="50" y1="8" x2="50" y2="14" stroke="#1e293b" stroke-width="1"/>
  <line x1="50" y1="86" x2="50" y2="92" stroke="#1e293b" stroke-width="1"/>
  <line x1="8" y1="50" x2="14" y2="50" stroke="#1e293b" stroke-width="1"/>
  <line x1="86" y1="50" x2="92" y2="50" stroke="#1e293b" stroke-width="1"/>

  <!-- Radar Glowing Data Nodes -->
  <circle cx="50" cy="12" r="1.5" fill="#22c55e" filter="url(#neonFilter)"/>
  <circle cx="50" cy="88" r="1.5" fill="#22c55e" filter="url(#neonFilter)"/>
  <circle cx="12" cy="50" r="1.5" fill="#22c55e" filter="url(#neonFilter)"/>
  <circle cx="88" cy="50" r="1.5" fill="#22c55e" filter="url(#neonFilter)"/>
  <circle cx="23" cy="27" r="1" fill="#22c55e" opacity="0.7"/>

  <!-- ACCESSORY 2: Data Metrics Hexagon Cluster (Top Right) -->
  <g fill="none" stroke="url(#neonGlow)" stroke-width="1.2" filter="url(#neonFilter)">
    <polygon points="69,22 73,20 77,22 77,26 73,28 69,26"/>
    <polygon points="63,29 67,27 71,29 71,33 67,35 63,33"/>
    <polygon points="69,36 73,34 77,36 77,40 73,42 69,40"/>
  </g>

  <!-- ACCESSORY 3: Upward Trend Growth Scale Arrow (Bottom Right) -->
  <path d="M72,78 L78,72 L83,76 L90,67 M85,67 L90,67 L90,72" 
        fill="none" 
        stroke="#94a3b8" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- MAIN EMBLEM LAYER -->
  <!-- 1. The Core Glowing Neon 'G' and Kettlebell Base Loop -->
  <g filter="url(#neonFilter)">
    <!-- Kettlebell Top Handle Ring -->
    <path d="M37,28 C37,17 63,17 63,28" fill="none" stroke="url(#neonGlow)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Outer Arc Framework of the Letter 'G' -->
    <path d="M54,28 C36,28 24,40 24,54 C24,68 36,80 54,80 C68,80 77,70 77,56 L54,56" 
          fill="none" 
          stroke="url(#neonGlow)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- 2. The Interlocking Cyber-Steel 'S' Profile Layer -->
  <!-- Positioned to wrap over the front to build an eye-catching 3D matrix dimension -->
  <path d="M69,33 C69,26 62,23 54,23 C42,23 39,33 46,41 C53,48 69,50 69,61 C69,72 58,79 47,79" 
        fill="none" 
        stroke="url(#cyberSteel)" 
        stroke-width="5.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- ACCESSORY 4: Integrated Heavy Diagonal Dumbbell (Lower Left) -->
  <g transform="translate(14, 52) rotate(-45)" filter="url(#neonFilter)">
    <!-- Main Solid Dumbbell Shaft -->
    <rect x="12" y="5" width="3" height="24" rx="1.5" fill="#ffffff"/>
    <!-- Inner Thick Weight Plate collars -->
    <rect x="9" y="9" width="9" height="2.5" rx="1" fill="url(#neonGlow)"/>
    <rect x="9" y="22.5" width="9" height="2.5" rx="1" fill="url(#neonGlow)"/>
    <!-- Outer Heavy Dumbbell End Plates -->
    <rect x="7" y="12.5" width="13" height="3" rx="1" fill="#ffffff"/>
    <rect x="7" y="18.5" width="13" height="3" rx="1" fill="#ffffff"/>
  </g>
</svg>
